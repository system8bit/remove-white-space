<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不要なホワイトスペース削除ツール</title>
<meta name="description" content="テキストから不要なホワイトスペース（連続空白・空行・共通インデント等）を削除するシンプルなツール。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #f7f8fc;
    --bg-card: #ffffff;
    --bg-card-hover: #f0f3ff;
    --bg-soft: #f9faff;
    --border-dim: #e2e6ef;
    --border-strong: #cbd2dc;
    --accent: #6366f1;
    --accent-light: #a5b4fc;
    --accent-warm: #f472b6;
    --text-primary: #1e1e2e;
    --text-secondary: #6b7280;
    --text-dim: #9ca3af;
    --success: #10b981;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg-deep);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 16px;
    position: relative;
    overflow-x: hidden;
    color: var(--text-primary);
    line-height: 1.6;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(99,102,241,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -20%;
    width: 70%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(244,114,182,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header-icon {
    font-size: 1.4rem;
    letter-spacing: 4px;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.7;
    margin-bottom: 8px;
  }
  h1 {
    font-weight: 700;
    font-size: 1.7rem;
    color: var(--text-primary);
    letter-spacing: 0.04em;
  }
  .header-sub {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .header-back {
    margin-top: 12px;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
  }
  .header-back a {
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px dotted var(--border-strong);
    padding-bottom: 1px;
  }
  .header-back a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  }
  .card.accent::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent-warm), var(--accent));
    opacity: 0.6;
  }

  .section-label {
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Textareas */
  textarea {
    width: 100%;
    min-height: 180px;
    padding: 14px 16px;
    background: var(--bg-soft);
    border: 1px solid var(--border-dim);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', 'Noto Sans JP', monospace;
    font-size: 0.88rem;
    line-height: 1.7;
    resize: vertical;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
  }
  textarea[readonly] {
    background: var(--bg-soft);
    color: var(--text-primary);
  }
  textarea::placeholder {
    color: var(--text-dim);
  }

  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 10px;
    padding: 0 4px;
  }
  .stats .stat-key {
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stats .stat-val {
    color: var(--text-secondary);
    font-weight: 600;
    margin-left: 4px;
  }
  .stats .stat-val.positive {
    color: var(--success);
  }

  /* Custom checkboxes */
  .options-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 4px;
  }

  .cb-label {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid transparent;
    transition: background 0.2s, border-color 0.2s;
  }
  .cb-label:hover {
    background: rgba(99,102,241,0.05);
    border-color: var(--border-dim);
  }
  .cb-label input[type="checkbox"] { display: none; }

  .cb-check {
    width: 20px; height: 20px;
    border: 2px solid var(--text-dim);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .cb-check svg {
    width: 12px; height: 12px;
    stroke: #fff;
    stroke-width: 3;
    fill: none;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.15s, transform 0.15s;
  }
  .cb-label input:checked + .cb-check {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(99,102,241,0.3);
  }
  .cb-label input:checked + .cb-check svg {
    opacity: 1;
    transform: scale(1);
  }

  .cb-body {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .cb-text {
    font-size: 0.9rem;
    color: var(--text-primary);
    font-weight: 500;
  }
  .cb-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    line-height: 1.4;
  }

  /* Buttons */
  .button-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin: 4px 0 24px;
  }
  button {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 10px;
    border: 1px solid var(--border-dim);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.02em;
  }
  button:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent-light);
    color: var(--text-primary);
  }
  button:active {
    transform: translateY(1px);
  }
  button:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
  }

  button.primary {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
    box-shadow: 0 4px 14px rgba(99,102,241,0.25);
    padding: 13px 28px;
    font-size: 0.95rem;
  }
  button.primary:hover {
    background: #4f52e5;
    border-color: #4f52e5;
    color: #ffffff;
    box-shadow: 0 6px 20px rgba(99,102,241,0.35);
  }

  button .icon {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    opacity: 0.85;
  }

  /* Footer */
  .page-footer {
    text-align: center;
    margin-top: 24px;
    padding-top: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  .page-footer a {
    color: var(--text-dim);
    text-decoration: none;
  }
  .page-footer a:hover {
    color: var(--accent);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg-card);
    color: var(--success);
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.5px;
    border: 1px solid rgba(16,185,129,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 0 16px rgba(16,185,129,0.08);
    opacity: 0;
    transition: opacity 0.35s, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Hint card */
  .hint {
    font-size: 0.78rem;
    color: var(--text-secondary);
    line-height: 1.7;
    padding: 14px 16px;
    background: var(--bg-soft);
    border: 1px solid var(--border-dim);
    border-radius: 10px;
  }
  .hint .kbd {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--text-secondary);
    margin: 0 2px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    body { padding: 24px 12px; }
    .container { max-width: 100%; }
    .card { padding: 18px; border-radius: 12px; }
    h1 { font-size: 1.4rem; }
    .options-grid { grid-template-columns: 1fr; }
    button { font-size: 0.85rem; padding: 10px 18px; }
    button.primary { padding: 12px 22px; font-size: 0.9rem; }
  }
</style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="header-icon">&lt;/&gt;</div>
      <h1>不要なホワイトスペース削除ツール</h1>
      <div class="header-sub">// remove unnecessary whitespace</div>
      <div class="header-back">
        <a href="https://system8bit.github.io/">&larr; back to home</a>
      </div>
    </div>

    <div class="card accent">
      <div class="section-label">
        <span>Input Text</span>
        <span id="inputBadge"></span>
      </div>
      <textarea id="input" placeholder="ここにテキストを貼り付けてください..." spellcheck="false"></textarea>
      <div class="stats">
        <span><span class="stat-key">chars</span><span class="stat-val" id="inputChars">0</span></span>
        <span><span class="stat-key">lines</span><span class="stat-val" id="inputLines">0</span></span>
      </div>
    </div>

    <div class="card">
      <div class="section-label"><span>Options</span></div>
      <div class="options-grid">
        <label class="cb-label" title="全行に共通する先頭インデントだけを揃えて削除（相対インデントは保持）">
          <input type="checkbox" id="optDedent" checked>
          <span class="cb-check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9.5 10,2.5"/></svg></span>
          <span class="cb-body"><span class="cb-text">共通インデントを削除</span><span class="cb-hint">// 全体のオフセットだけ除去</span></span>
        </label>
        <label class="cb-label">
          <input type="checkbox" id="optTrailing" checked>
          <span class="cb-check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9.5 10,2.5"/></svg></span>
          <span class="cb-body"><span class="cb-text">行末の空白を削除</span><span class="cb-hint">// rtrim each line</span></span>
        </label>
        <label class="cb-label">
          <input type="checkbox" id="optCollapseSpaces" checked>
          <span class="cb-check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9.5 10,2.5"/></svg></span>
          <span class="cb-body"><span class="cb-text">連続する空白を1つに</span><span class="cb-hint">// 行頭インデントは保持</span></span>
        </label>
        <label class="cb-label">
          <input type="checkbox" id="optCollapseBlankLines" checked>
          <span class="cb-check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9.5 10,2.5"/></svg></span>
          <span class="cb-body"><span class="cb-text">連続する空行を1つに</span><span class="cb-hint">// collapse blank lines</span></span>
        </label>
        <label class="cb-label">
          <input type="checkbox" id="optRemoveBlankLines">
          <span class="cb-check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9.5 10,2.5"/></svg></span>
          <span class="cb-body"><span class="cb-text">空行を全て削除</span><span class="cb-hint">// remove all blank lines</span></span>
        </label>
        <label class="cb-label">
          <input type="checkbox" id="optTabs" checked>
          <span class="cb-check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9.5 10,2.5"/></svg></span>
          <span class="cb-body"><span class="cb-text">タブをスペースに変換</span><span class="cb-hint">// \t &rarr; space</span></span>
        </label>
        <label class="cb-label">
          <input type="checkbox" id="optFullWidth">
          <span class="cb-check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9.5 10,2.5"/></svg></span>
          <span class="cb-body"><span class="cb-text">全角スペースを半角に変換</span><span class="cb-hint">// 　 &rarr; space</span></span>
        </label>
        <label class="cb-label">
          <input type="checkbox" id="optNbsp" checked>
          <span class="cb-check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9.5 10,2.5"/></svg></span>
          <span class="cb-body"><span class="cb-text">NBSPを半角に変換</span><span class="cb-hint">// non-breaking space</span></span>
        </label>
        <label class="cb-label">
          <input type="checkbox" id="optInvisibles" checked>
          <span class="cb-check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9.5 10,2.5"/></svg></span>
          <span class="cb-body"><span class="cb-text">不可視文字を削除</span><span class="cb-hint">// ZWSP / BOM など</span></span>
        </label>
        <label class="cb-label">
          <input type="checkbox" id="optTrimAll" checked>
          <span class="cb-check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9.5 10,2.5"/></svg></span>
          <span class="cb-body"><span class="cb-text">全体の前後の空白を削除</span><span class="cb-hint">// trim entire text</span></span>
        </label>
      </div>
    </div>

    <div class="button-row">
      <button class="primary" id="processBtn" type="button">
        <span class="icon">&#9656;</span> 不要なスペースを削除
      </button>
      <button id="copyBtn" type="button">
        <span class="icon">[ ]</span> 結果をコピー
      </button>
      <button id="clearBtn" type="button">
        <span class="icon">&times;</span> クリア
      </button>
    </div>

    <div class="card">
      <div class="section-label"><span>Output</span></div>
      <textarea id="output" readonly placeholder="ここに結果が表示されます..." spellcheck="false"></textarea>
      <div class="stats">
        <span><span class="stat-key">chars</span><span class="stat-val" id="outputChars">0</span></span>
        <span><span class="stat-key">lines</span><span class="stat-val" id="outputLines">0</span></span>
        <span><span class="stat-key">removed</span><span class="stat-val positive" id="diffChars">0</span></span>
      </div>
    </div>

    <div class="card">
      <div class="section-label"><span>Tips</span></div>
      <div class="hint">
        <span class="kbd">Ctrl</span> または <span class="kbd">⌘ Cmd</span> + <span class="kbd">Enter</span> で実行できます。<br>
        「共通インデントを削除」は、文章全体が一律にインデントされているときにそのオフセット分だけを取り除きます（相対的な字下げは維持）。
      </div>
    </div>

    <div class="page-footer">
      &copy; 2026 system8bit &middot; <a href="https://github.com/system8bit/remove-white-space">source</a>
    </div>
  </div>

  <div class="toast" id="toast">&#10003; コピーしました</div>

<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const input = $('input');
  const output = $('output');

  // 空白扱いする文字: 半角SP / TAB / 全角SP / NBSP
  const WS_CLASS = '[ \\t\\u3000\\u00A0]';
  const reTrailing = new RegExp(WS_CLASS + '+$');
  const reLeading = new RegExp('^' + WS_CLASS + '*');
  const reCollapseInline = new RegExp(WS_CLASS + '+', 'g');

  function countLines(text) {
    if (text.length === 0) return 0;
    return text.split('\n').length;
  }

  function updateInputStats() {
    $('inputChars').textContent = input.value.length;
    $('inputLines').textContent = countLines(input.value);
  }

  function updateOutputStats() {
    const outLen = output.value.length;
    const diff = input.value.length - outLen;
    $('outputChars').textContent = outLen;
    $('outputLines').textContent = countLines(output.value);
    $('diffChars').textContent = diff > 0 ? '-' + diff : diff;
  }

  function showToast(msg, isError) {
    const t = $('toast');
    t.innerHTML = msg;
    t.style.color = isError ? 'var(--danger)' : 'var(--success)';
    t.style.borderColor = isError ? 'rgba(239,68,68,0.3)' : 'rgba(16,185,129,0.3)';
    t.classList.add('show');
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => t.classList.remove('show'), 1600);
  }

  function process() {
    let text = input.value;

    if ($('optInvisibles').checked) {
      // ZWSP, ZWNJ, ZWJ, WORD JOINER, BOM
      text = text.replace(/[​-‍⁠﻿]/g, '');
    }

    if ($('optNbsp').checked) {
      text = text.replace(/ /g, ' ');
    }

    if ($('optFullWidth').checked) {
      text = text.replace(/　/g, ' ');
    }

    if ($('optTabs').checked) {
      text = text.replace(/\t/g, ' ');
    }

    if ($('optTrailing').checked) {
      text = text.split('\n').map((line) => line.replace(reTrailing, '')).join('\n');
    }

    if ($('optDedent').checked) {
      // 非空行に共通する先頭の空白プレフィックスを求めて、その分だけ各行から削除する
      // （連続空白の圧縮より前に行うことで、相対的なインデントを保持する）
      const lines = text.split('\n');
      const nonEmpty = lines.filter((l) => l.trim().length > 0);
      if (nonEmpty.length > 0) {
        const leads = nonEmpty.map((l) => (l.match(reLeading) || [''])[0]);
        let common = leads[0];
        for (let i = 1; i < leads.length; i++) {
          const a = common, b = leads[i];
          let j = 0;
          const max = Math.min(a.length, b.length);
          while (j < max && a.charCodeAt(j) === b.charCodeAt(j)) j++;
          common = a.slice(0, j);
          if (common.length === 0) break;
        }
        if (common.length > 0) {
          text = lines.map((l) => l.startsWith(common) ? l.slice(common.length) : l).join('\n');
        }
      }
    }

    if ($('optCollapseSpaces').checked) {
      // 行頭の空白はそのまま残し、それ以降の連続空白だけを1つに圧縮する
      text = text.split('\n').map((line) => {
        const m = line.match(reLeading);
        const lead = m ? m[0] : '';
        return lead + line.slice(lead.length).replace(reCollapseInline, ' ');
      }).join('\n');
    }

    if ($('optRemoveBlankLines').checked) {
      text = text.split('\n').filter((line) => line.trim().length > 0).join('\n');
    } else if ($('optCollapseBlankLines').checked) {
      text = text.replace(/(?:[ \t]*\r?\n){2,}/g, '\n\n');
    }

    if ($('optTrimAll').checked) {
      text = text.trim();
    }

    output.value = text;
    updateOutputStats();
  }

  $('processBtn').addEventListener('click', process);

  $('copyBtn').addEventListener('click', async () => {
    if (output.value.length === 0) {
      showToast('&#9888; コピーする結果がありません', true);
      return;
    }
    try {
      await navigator.clipboard.writeText(output.value);
      showToast('&#10003; コピーしました');
    } catch (e) {
      output.select();
      document.execCommand('copy');
      window.getSelection().removeAllRanges();
      showToast('&#10003; コピーしました');
    }
  });

  $('clearBtn').addEventListener('click', () => {
    input.value = '';
    output.value = '';
    updateInputStats();
    updateOutputStats();
    input.focus();
  });

  input.addEventListener('input', updateInputStats);

  input.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      process();
    }
  });

  updateInputStats();
  updateOutputStats();
})();
</script>
</body>
</html>
